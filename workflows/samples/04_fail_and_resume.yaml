workflow:
  id: fail_and_resume
  version: v1
inputs:
  issue:
    description: The issue text to process
    default: "Login API fails for invalid token"
on_error: fail_fast
steps:
  - id: generate_summary
    type: model
    handler: generate_summary
    inputs:
      issue: inputs.issue

  - id: failing_external_call
    type: tool
    tool: tools.missing_adapter
    inputs:
      message: steps.generate_summary.summary

  - id: finalization
    type: tool
    tool: tools.echo
    inputs:
      message: "done"
