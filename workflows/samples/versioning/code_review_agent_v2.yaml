workflow:
  id: code_review_agent
  version: v2
inputs:
  issue:
    description: The issue text for code review
    default: "Login API fails for invalid token"
on_error: fail_fast
steps:
  - id: generate_summary
    type: model
    handler: generate_summary
    inputs:
      issue: inputs.issue

  - id: echo_summary
    type: tool
    tool: tools.echo
    inputs:
      message: steps.generate_summary.summary

  - id: finalization
    type: tool
    tool: tools.echo
    inputs:
      message: "code_review_agent v2 completed"
