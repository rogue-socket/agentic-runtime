workflow:
  id: retry_and_backoff
  version: v1
on_error: fail_fast
steps:
  - id: generate_summary
    type: model
    handler: generate_summary
    inputs:
      issue: inputs.issue
    retry:
      attempts: 3
      backoff: exponential
      initial_delay: 1

  - id: deliver_summary
    type: tool
    tool: tools.echo
    inputs:
      message: steps.generate_summary.summary
