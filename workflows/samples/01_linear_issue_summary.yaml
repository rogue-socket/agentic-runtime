workflow:
  id: linear_issue_summary
  version: v1
inputs:
  issue:
    description: The issue text to summarize
    default: "Login API fails for invalid token"
on_error: fail_fast
steps:
  - id: generate_summary
    type: model
    handler: generate_summary
    inputs:
      issue: inputs.issue

  - id: echo_summary
    type: tool
    tool: tools.echo
    inputs:
      message: steps.generate_summary.summary
